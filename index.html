<body>
<div class="container">

<script>
    // ======================= 按黄昆《固体物理学》教材章节分类的独特题库 =======================
    
    // 第一章 晶体结构 (15道)
    const chapter1 = [
        { q: "1.1 什么是布喇菲点阵？共有多少种？分别属于哪些晶系？", a: "【详细解析】布喇菲点阵是由一系列在空间周期性排列的几何点（格点）组成的阵列，每个格点周围环境完全相同。共有14种布喇菲点阵，分为7大晶系：三斜(1种)、单斜(2种)、正交(4种)、四方(2种)、三角(1种)、六角(1种)、立方(3种：简单立方、体心立方、面心立方)。这是描述晶体周期性的数学抽象。" },
        { q: "1.2 面心立方晶格的原胞体积与结晶学晶胞体积的关系是什么？", a: "【详细解析】面心立方(FCC)结晶学晶胞边长为a，体积V_cell=a³，包含4个格点。原胞是体积最小的重复单元，只包含1个格点，原胞体积Ω=a³/4。原胞基矢可取为a₁=a/2(j+k)、a₂=a/2(k+i)、a₃=a/2(i+j)，构成菱形六面体。" },
        { q: "1.3 什么是倒格子？倒格子基矢如何定义？", a: "【详细解析】倒格子是与正格子相对应的傅里叶空间点阵，基矢满足a_i·b_j=2πδ_ij。倒格子基矢计算公式：b₁=2π(a₂×a₃)/Ω，b₂=2π(a₃×a₁)/Ω，b₃=2π(a₁×a₂)/Ω，其中Ω为正格子原胞体积。倒格子是描述衍射和波矢空间的核心工具。" },
        { q: "1.4 证明面心立方(FCC)的倒格子是体心立方(BCC)。", a: "【证明】FCC基矢：a₁=(a/2)(j+k)，a₂=(a/2)(k+i)，a₃=(a/2)(i+j)。原胞体积Ω=a³/4。计算倒格子基矢b₁=2π(a₂×a₃)/Ω=(2π/a)(-i+j+k)。同理b₂=(2π/a)(i-j+k)，b₃=(2π/a)(i+j-k)。三基矢互成109°28′，大小相等，构成BCC基矢。故FCC倒格子为BCC。" },
        { q: "1.5 什么是第一布里渊区？对于面心立方晶格，第一布里渊区是什么形状？", a: "【详细解析】第一布里渊区是倒格子空间中以某一倒格点为中心，作各倒格矢中垂面所围成的最小对称区域，即倒格子空间的Wigner-Seitz原胞。面心立方晶格（正格子）的倒格子是体心立方，其第一布里渊区为截角八面体（十四面体），由12个正方形和8个正六边形组成。" },
        { q: "1.6 计算简单立方晶格(110)晶面的面间距d。", a: "【计算】简单立方晶格晶面间距公式：d_{hkl}=a/√(h²+k²+l²)。对于(110)面：h=1,k=1,l=0。d = a/√(1²+1²+0²)= a/√2。若a=4Å，则d=4/1.414=2.828Å。物理意义：(110)面面间距小于(100)面(d=a)，原子密度较低。" },
        { q: "1.7 什么是密勒指数？如何确定晶面的密勒指数？", a: "【详细解析】密勒指数是描述晶面方向的三个整数(hkl)，表示晶面在三个晶轴上的截距倒数的互质整数比。确定步骤：(1)找出晶面在三个晶轴上的截距（以基矢长度为单位的数值）；(2)取截距的倒数；(3)化为最小互质整数。若晶面与某轴平行，截距为∞，倒数为0。" },
        { q: "1.8 金刚石结构属于什么晶系？每个原胞包含几个原子？", a: "【详细解析】金刚石结构属于立方晶系，是复式格子，由两个面心立方子晶格沿体对角线位移(1/4,1/4,1/4)套构而成。每个原胞包含2个碳原子，每个结晶学晶胞包含8个碳原子。碳原子以sp³杂化轨道形成共价键，键角109°28′。" },
        { q: "1.9 什么是配位数？面心立方、体心立方、简单立方的配位数各是多少？", a: "【详细解析】配位数是晶体中一个原子周围最近邻且等距的原子数目。面心立方(FCC)和六角密堆积(HCP)的配位数为12；体心立方(BCC)为8（每个原子有8个最近邻，6个次近邻）；简单立方(SC)为6；金刚石结构为4；氯化铯(CsCl)结构为8。" },
        { q: "1.10 什么是维格纳-赛兹原胞？它与布里渊区有什么关系？", a: "【详细解析】维格纳-赛兹原胞(W-S原胞)是以某一格点为中心，作与最近邻格点连线的中垂面所围成的最小对称原胞。在正格子空间中，W-S原胞是原胞的一种取法。在倒格子空间中，第一布里渊区就是倒格子空间的Wigner-Seitz原胞。W-S原胞能最直观地反映晶格的对称性。" },
        { q: "1.11 六角密堆积(HCP)结构的晶胞参数c与a的比值是多少？为什么？", a: "【详细解析】理想六角密堆积(HCP)的轴比c/a=√(8/3)≈1.633。推导：HCP结构中，第二层原子位于第一层三个原子形成的凹陷处，相邻两层原子间距等于原子直径。几何关系：a=2r，c=2×√(2/3)a=√(8/3)a。实际金属如Mg的c/a≈1.624，Zn的c/a≈1.861（偏离理想值）。" },
        { q: "1.12 证明晶带轴[uvw]与晶面(hkl)满足hu+kv+lw=0。", a: "【证明】晶带轴[uvw]方向矢量T=ua₁+va₂+wa₃。晶面(hkl)的法线方向为倒格矢G=hb₁+kb₂+lb₃。晶带轴平行于晶面，故T垂直于G，即G·T=0。由a_i·b_j=2πδ_ij得：G·T=2π(hu+kv+lw)=0，因此hu+kv+lw=0。证毕。" },
        { q: "1.13 什么是解理面？为什么解理面通常是面指数低的晶面？", a: "【详细解析】解理面是晶体在外力作用下优先裂开的晶面。面指数低的晶面面间距大，原子层间结合力（范德瓦耳斯力或部分共价键）较弱，因此容易沿这些面解理。例如云母沿(001)面解理，石墨沿(0001)面解理，金刚石沿{111}面解理。" },
        { q: "1.14 画出体心立方晶格的(100)、(110)和(111)面上的原子分布示意图。", a: "【作图要点】(100)面：简单正方格点，原子间距a。(110)面：矩形格点，原子在顶点和体心投影，形成中心矩形。(111)面：六角密排状，原子排成等边三角形网格。BCC(111)面原子密度较低。" },
        { q: "1.15 什么是空间群和点群？它们分别描述晶体的什么对称性？", a: "【详细解析】点群描述晶体宏观外形的对称性，包括旋转、反映、反演等对称操作，共有32种。空间群描述晶体微观结构的全部对称性，包括平移对称性和点群对称操作的组合，共有230种。点群是空间群在平移对称性下的商群。" }
    ];

    // 第二章 固体的结合 (10道)
    const chapter2 = [
        { q: "2.1 晶体有哪几种基本结合类型？各有什么特点？", a: "【详细解析】五种基本结合类型：(1)离子晶体(如NaCl)：库仑力，高硬度高熔点；(2)共价晶体(如金刚石)：共用电子对，方向性和饱和性；(3)金属晶体(如Cu)：自由电子气与离子实吸引，良好导电导热；(4)分子晶体(如Ar)：范德瓦耳斯力，低熔点易压缩；(5)氢键晶体(如冰)：氢原子桥接，方向性强。" },
        { q: "2.2 解释离子晶体的马德隆常数及其物理意义。", a: "【详细解析】马德隆常数α是离子晶体中所有离子对参考离子的库仑势能求和的无量纲常数，定义为U_coul = -α e²/(4πε₀R)，R为最近邻离子距离。NaCl结构的α≈1.7476，CsCl结构α≈1.7627。马德隆常数反映了晶体结构对结合能的贡献，与几何排列有关。" },
        { q: "2.3 什么是共价键的饱和性和方向性？以金刚石为例说明。", a: "【详细解析】饱和性：每个原子形成的共价键数目等于未成对电子数，如碳有4个未成对电子，最多形成4个键。方向性：共价键沿电子云最大重叠方向形成，金刚石中sp³杂化轨道指向正四面体顶点，键角109°28′。饱和性和方向性决定了共价晶体的特定结构。" },
        { q: "2.4 金属键的自由电子模型是如何解释金属的导电性和延展性的？", a: "【详细解析】自由电子模型认为金属中价电子脱离原子成为在晶格中自由运动的电子气，离子实排列在格点上。导电性：自由电子在外电场中定向移动形成电流。延展性：离子实可相对滑动而不破坏电中性，因为自由电子气能重新分布保持金属键。" },
        { q: "2.5 范德瓦耳斯结合的本质是什么？写出Lennard-Jones势表达式。", a: "【详细解析】本质是瞬时偶极矩诱导的色散力（量子力学效应）。Lennard-Jones势：U(r)=4ε[(σ/r)^12 - (σ/r)^6]，其中第一项为短程排斥（泡利不相容原理），第二项为长程吸引（范德瓦耳斯力），ε为势阱深度，σ为原子直径。" },
        { q: "2.6 氢键结合有何特点？为什么冰的密度比水小？", a: "【详细解析】氢键是氢原子与电负性大的原子（O、N、F）之间的静电吸引力，具有方向性和饱和性。冰中水分子通过氢键形成四面体骨架，分子间空隙较大，密度比液态水小（约0.92 g/cm³）。温度升高时氢键断裂，分子排列更紧密，密度增大，在4℃时密度最大。" },
        { q: "2.7 计算NaCl型离子晶体的结合能（定性分析）。", a: "【详细解析】NaCl晶体结合能U = -N(αe²/(4πε₀R) - B/R^n)，其中N为原子对数，α=1.7476为马德隆常数，B和n由排斥势决定。平衡时dU/dR=0，可解出平衡距离R₀。NaCl的实验结合能约7.9 eV/离子对，库仑能贡献约-8.3 eV，排斥能贡献约+0.4 eV。" },
        { q: "2.8 什么是轨道杂化？以sp³杂化为例说明。", a: "【详细解析】轨道杂化是不同原子轨道混合形成新等价轨道的过程。sp³杂化：一个ns轨道和三个np轨道线性组合成四个等价的sp³杂化轨道，指向正四面体四个顶点，键角109°28′。金刚石、硅、锗等共价晶体中的原子采取sp³杂化。" },
        { q: "2.9 解释分子晶体中色散力的来源。", a: "【详细解析】色散力来源于电子运动产生的瞬时偶极矩。原子中电子绕核运动，瞬时电子云分布不对称产生瞬时偶极矩，该偶极矩诱导邻近原子产生偶极矩，产生吸引力。量子力学计算给出势能U(r)∝ -1/r⁶。色散力存在于所有原子/分子之间，是惰性气体晶体的主要结合力。" },
        { q: "2.10 比较离子晶体、共价晶体和金属晶体的硬度和熔点差异。", a: "【详细解析】离子晶体：硬度高、熔点高（如NaCl熔点801℃），但脆性大。共价晶体：硬度极高、熔点极高（金刚石熔点>3550℃），最硬材料。金属晶体：硬度差异大（Na软，W硬），熔点差异大（Hg室温液态，W熔点3422℃），通常具有延展性。分子晶体：硬度低、熔点低（Ar熔点-189℃）。" }
    ];

    // 第三章 晶格振动 (12道)
    const chapter3 = [
        { q: "3.1 什么是声子？它具有哪些玻色子特性？", a: "【详细解析】声子是晶格振动的能量量子，是玻色子。玻色子特性：(1)能量E=ℏω_q，准动量p=ℏq；(2)服从玻色-爱因斯坦统计，化学势μ=0；(3)声子数不守恒，可产生和湮灭；(4)多个声子可占据同一量子态；(5)参与晶体的热容、热导、电导、超导等物理过程。" },
        { q: "3.2 推导一维单原子链的色散关系ω(q)。", a: "【推导】原子质量为m，劲度系数β，原子位移u_n。运动方程：m d²u_n/dt²=β(u_{n+1}+u_{n-1}-2u_n)。设u_n=Ae^{i(qna-ωt)}，代入得：-mω²=2β(cos qa-1)=-4β sin²(qa/2)。故ω(q)=2√(β/m)|sin(qa/2)|。q→0时ω≈a√(β/m)q，长波极限为弹性波。" },
        { q: "3.3 什么是一维双原子链的声学支和光学支？", a: "【详细解析】一维双原子链（质量M和m，M>m）有两种振动模式。声学支：相邻原子同相振动，q→0时ω∝q，频率从0开始。光学支：相邻原子反相振动，q→0时ω=√(2β/μ)（μ为约化质量），频率不为零。两者之间存在频率带隙。光学支在离子晶体中可与红外光耦合。" },
        { q: "3.4 简述德拜模型的基本假设和主要结论。", a: "【详细解析】基本假设：(1)晶体视为连续弹性介质，色散关系ω=cq；(2)引入截止频率ω_D，使总振动模式数等于3N。主要结论：(1)高温区C_V→3Nk_B（杜隆-珀替定律）；(2)低温区C_V∝(T/Θ_D)³，即德拜T³定律，与实验吻合；(3)德拜温度Θ_D=ℏω_D/k_B是特征温度。" },
        { q: "3.5 证明德拜模型中低温比热C_V∝T³。", a: "【证明】德拜频率分布g(ω)=9Nω²/ω_D³。内能U=∫(ℏω/(e^{ℏω/k_BT}-1))g(ω)dω。低温下令x=ℏω/k_BT，积分上限→∞。U=9Nk_BT(T/Θ_D)³∫₀^∞ x³/(e^x-1)dx，∫₀^∞ x³/(e^x-1)dx=π⁴/15。故U∝T⁴，C_V=dU/dT∝T³。" },
        { q: "3.6 爱因斯坦模型和德拜模型在处理比热时有何区别？", a: "【详细解析】爱因斯坦模型：假设所有原子以相同频率ω_E独立振动，频率分布为δ函数，低温下C_V∝(Θ_E/T)²e^{-Θ_E/T}，下降过快，与实验不符。德拜模型：考虑频率分布g(ω)∝ω²，低温下C_V∝T³，与实验吻合。德拜模型更准确地描述了低频声学支的贡献。" },
        { q: "3.7 什么是非简谐效应？它导致哪些物理现象？", a: "【详细解析】非简谐效应是晶格振动势能中三次及更高次项的贡献，在简谐近似下被忽略。非简谐效应导致：(1)热膨胀：原子平均位置随温度升高而偏移；(2)有限热导率：声子-声子散射导致热阻；(3)声子寿命有限：谱线展宽；(4)热容的高温修正。" },
        { q: "3.8 解释晶格热导率的声子气体模型。", a: "【详细解析】声子气体模型将声子视为气体，热导率κ=(1/3)C_v v λ，其中C_v为声子比热容，v为声速（≈5×10³ m/s），λ为声子平均自由程。高温下声子-声子散射主导，λ∝1/T，κ∝1/T；低温下杂质和边界散射主导，λ≈常数，κ∝T³。" },
        { q: "3.9 什么是Kohn异常？它在声子色散曲线中如何表现？", a: "【详细解析】Kohn异常是金属中声子色散曲线在q=2k_F处出现斜率突变的现象，由费米面附近电子对声子的强烈屏蔽引起。电子-声子相互作用使声子频率软化，在q=2k_F处出现转折点。Kohn异常是电子-声子相互作用的直接证据，与超导电性和电荷密度波密切相关。" },
        { q: "3.10 中子非弹性散射如何测量声子色散关系？", a: "【详细解析】原理：入射中子的能量E_i和动量p_i，散射后变为E_f和p_f，能量转移ΔE=E_i-E_f=±ℏω_q，动量转移Δp=p_i-p_f=ℏq±ℏG。通过测量散射中子的能量和角度分布，可得到声子频率ω_q与波矢q的关系。这是目前测量声子谱最精确的方法。" },
        { q: "3.11 一维单原子链中格波的最大频率是多少？", a: "【计算】一维单原子链色散关系ω(q)=2√(β/m)|sin(qa/2)|。第一布里渊区q∈[-π/a, π/a]，|sin(qa/2)|在|q|=π/a时取最大值1。因此ω_max=2√(β/m)。当q→0时，ω≈a√(β/m)q，声速v_s=a√(β/m)。" },
        { q: "3.12 什么是声学支和光学支的长波极限特性？", a: "【详细解析】长波极限(q→0)：声学支：ω∝q，原子同相振动，类似弹性波，色散关系线性，声速v=√(βa²/(M+m))（双原子链）。光学支：ω→常数，原子反相振动，质心不动。在离子晶体中，光学支长波极限可被红外光激发，产生电极化，称为Reststrahlen带。" }
    ];

    // 第四章 能带理论 (12道)
    const chapter4 = [
        { q: "4.1 简述布洛赫定理及其物理意义。", a: "【详细解析】布洛赫定理：周期势场V(r+R)=V(r)中运动的电子，波函数满足ψ_k(r+R)=e^{ik·R}ψ_k(r)，即ψ_k(r)=e^{ik·r}u_k(r)，u_k(r)具有晶格周期性。物理意义：(1)波矢k是好量子数；(2)能带E_n(k)是周期函数；(3)将无穷大晶体问题简化为第一布里渊区内k点的本征值问题。" },
        { q: "4.2 近自由电子模型的基本思想是什么？能隙如何产生？", a: "【详细解析】基本思想：将周期势场的平均值作为零级近似，周期起伏作为微扰处理，适用于金属价电子。能隙产生：在布里渊区边界k=π/a处，电子波满足布拉格反射条件形成驻波，两个驻波解对应不同能量分布，产生能量分裂ΔE=2|V_n|，即能隙。" },
        { q: "4.3 紧束缚模型的基本思想是什么？适用于什么情况？", a: "【详细解析】基本思想：电子紧束缚在原子附近，波函数视为原子轨道的线性组合(LCAO)。适用于内层电子和绝缘体/半导体的价带。能带表达式：E(k)=E₀-α-βΣ e^{ik·R}，β为交叠积分，能带宽度与原子轨道交叠程度有关。" },
        { q: "4.4 什么是有效质量？它的物理意义是什么？", a: "【详细解析】有效质量定义为m*=ℏ²/(d²E/dk²)，是电子在周期势场中运动时外力与加速度关系的等效质量。物理意义：(1)反映周期势场对电子运动的影响；(2)能带底m*>0，能带顶m*<0；(3)可通过回旋共振测量；(4)决定载流子迁移率μ=eτ/m*。" },
        { q: "4.5 根据能带论，导体、半导体、绝缘体如何区分？", a: "【详细解析】导体：存在部分填充的能带（如金属）或能带交叠（如碱金属），电子可自由移动，导电性好。半导体：价带全满、导带全空，带隙E_g<3eV，室温下电子可热激发跃迁。绝缘体：带隙E_g>3eV，电子难以跃迁，导电性极差。" },
        { q: "4.6 什么是直接带隙和间接带隙半导体？举例说明。", a: "【详细解析】直接带隙：导带底和价带顶在同一k点（如GaAs的Γ点），电子跃迁不需要声子参与，发光效率高。间接带隙：导带底和价带顶在不同k点（如Si：价带顶在Γ点，导带底在X方向），跃迁需声子参与，发光效率较低。直接带隙材料适合做发光二极管和激光器。" },
        { q: "4.7 什么是空穴？它在半导体中如何运动？", a: "【详细解析】空穴是价带中缺失电子形成的准粒子，带正电（+e），有效质量为正。空穴的运动等价于价带中其他电子的集体运动。在外电场中，空穴沿电场方向运动，与电子方向相反。空穴浓度p和电子浓度n满足np=n_i²，n_i为本征载流子浓度。" },
        { q: "4.8 证明自由电子气模型的能态密度g(E)∝E^{1/2}（三维）。", a: "【证明】k空间态密度：V/(2π)³，等能面为球面。k到k+dk区间状态数dN=2×V/(2π)³×4πk²dk=Vk²dk/π²。由E=ℏ²k²/(2m)，k=√(2mE)/ℏ，dk=√(m/(2E))dE/ℏ。代入得dN=V/(π²)×(2mE/ℏ²)×√(m/(2E))dE/ℏ=V(2m)^{3/2}√E dE/(2π²ℏ³)。故g(E)=dN/dE∝√E。" },
        { q: "4.9 什么是费米能级？在绝对零度时费米能级如何确定？", a: "【详细解析】费米能级E_F是绝对零度时电子占据的最高能级，是区分占据态和空态的分界线。由电子总数N=∫₀^{E_F}g(E)dE确定。对于自由电子气，E_F=ℏ²(3π²n)^{2/3}/(2m)，n=N/V为电子密度。典型金属Cu的E_F≈7.0eV，对应费米温度T_F≈8×10⁴K。" },
        { q: "4.10 什么是电子-声子相互作用？它在超导中起什么作用？", a: "【详细解析】电子-声子相互作用是电子与晶格振动之间的耦合：电子运动引起晶格畸变，畸变势场又反过来影响电子。在BCS超导理论中，该相互作用导致两个电子之间产生有效吸引势，形成库珀对。临界温度T_c≈1.14Θ_D exp[-1/(N(0)V)]，其中V为电子-声子耦合势。" },
        { q: "4.11 解释能带计算中的赝势方法。", a: "【详细解析】赝势方法是一种简化能带计算的方法，将离子实的强势场替换为弱的赝势，同时将真实的价电子波函数替换为平滑的赝波函数。赝势的构造使得离子实区域的波函数振荡被消除，从而可以用平面波基组展开。赝势方法大大简化了计算，是现代能带计算的重要工具。" },
        { q: "4.12 什么是范霍夫奇点？它如何影响电子态密度？", a: "【详细解析】范霍夫奇点是能带E(k)的梯度∇_kE=0的点（临界点），通常出现在布里渊区的高对称点或边界上。在奇点附近，态密度g(E)呈现奇异性（如二维态密度对数发散，一维态密度1/√(E-E₀)发散）。范霍夫奇点导致光学吸收谱和输运性质出现特征结构。" }
    ];

    // 第五章 金属电子论 (8道)
    const chapter5 = [
        { q: "5.1 自由电子气模型如何解释金属的电子比热？", a: "【详细解析】自由电子气模型给出电子比热C_el=γT，其中γ=(π²/2)(Nk_B/T_F)。原因：只有费米面附近~k_BT范围内的电子可被热激发，激发电子数比例约T/T_F，每个激发电子贡献~k_B能量，总比热∝T。低温下电子比热与声子比热T³共存，总比热C=γT+βT³。" },
        { q: "5.2 什么是费米面？它在k空间中是什么形状？", a: "【详细解析】费米面是k空间中能量等于费米能级E_F的等能面。对于自由电子气，费米面是球面，半径k_F=(3π²n)^{1/3}。在实际金属中，由于周期势场的影响，费米面发生畸变：如Cu的费米面沿<111>方向突出（颈），沿<100>方向内缩。费米面的形状可通过德哈斯-范阿尔芬效应测量。" },
        { q: "5.3 推导自由电子气模型的电导率公式σ=ne²τ/m。", a: "【推导】在外电场E作用下，电子受力F=-eE。牛顿第二定律：m dv/dt = -eE - mv/τ，τ为弛豫时间。稳态时dv/dt=0，得漂移速度v_d=-eEτ/m。电流密度J=-nev_d=ne²τE/m。故电导率σ=ne²τ/m。迁移率μ=|v_d|/|E|=eτ/m。" },
        { q: "5.4 什么是德哈斯-范阿尔芬效应？它如何反映费米面形状？", a: "【详细解析】德哈斯-范阿尔芬效应是金属在低温强磁场下磁化率随磁场的倒数1/B周期性振荡的现象。振荡周期与费米面的极值截面积A_ext有关：Δ(1/B)=2πe/(ℏA_ext)。通过测量不同方向的振荡周期，可重构费米面形状。这是研究金属费米面的重要实验手段。" },
        { q: "5.5 解释金属的魏德曼-弗兰兹定律。", a: "【详细解析】魏德曼-弗兰兹定律：金属的热导率κ与电导率σ之比与温度T成正比，κ/σ=LT，其中L=π²k_B²/(3e²)=2.45×10⁻⁸ W·Ω/K²为洛伦兹数。这一定律表明金属中热导和电导都由自由电子主导，是自由电子气模型的重要验证。" },
        { q: "5.6 什么是霍耳效应？如何通过霍耳系数判断载流子类型？", a: "【详细解析】霍耳效应：通电导体/半导体置于垂直磁场中，载流子受洛伦兹力偏转，在横向产生霍耳电压V_H=(IB)/(ned)。霍耳系数R_H=V_H d/(IB)=1/(ne)。n型半导体R_H为负，p型R_H为正。通过R_H的符号和大小可判断载流子类型和浓度。" },
        { q: "5.7 计算铜的自由电子密度和费米波矢（已知Cu密度8.96g/cm³，原子量63.5）。", a: "【计算】Cu为面心立方，每个原子贡献1个自由电子。原子数密度n=ρN_A/M=8.96×6.022×10²³/63.5=8.5×10²⁸ m⁻³。费米波矢k_F=(3π²n)^{1/3}=[3π²×8.5×10²⁸]^{1/3}=1.36×10¹⁰ m⁻¹。费米能量E_F=ℏ²k_F²/(2m)=7.0 eV，费米速度v_F=ℏk_F/m=1.57×10⁶ m/s。" },
        { q: "5.8 什么是朗道能级？在强磁场下二维电子气的能级如何量子化？", a: "【详细解析】朗道能级：电子在垂直磁场中运动时，回旋运动被量子化，能级E_n=ℏω_c(n+1/2)，ω_c=eB/m为回旋频率，n=0,1,2,...。二维电子气（如半导体异质结）在强磁场下朗道能级简并度D=eB/h。当费米能级位于朗道能级之间时，霍耳电阻出现量子化平台（整数量子霍尔效应）。" }
    ];

    // 第六章 半导体物理 (8道)
    const chapter6 = [
        { q: "6.1 什么是本征半导体？本征载流子浓度与温度的关系是什么？", a: "【详细解析】本征半导体是纯净无杂质的半导体，电子浓度n等于空穴浓度p，n=p=n_i。本征载流子浓度n_i=√(N_cN_v)exp(-E_g/(2k_BT))，N_c、N_v为导带和价带有效态密度。n_i随温度升高指数增大，Si在300K时n_i≈1.5×10¹⁰ cm⁻³。" },
        { q: "6.2 解释施主杂质和受主杂质在半导体中的作用。", a: "【详细解析】施主杂质（如Si中掺P、As）：价电子数比基体多1，多余电子易电离进入导带，提供电子，形成n型半导体，施主能级靠近导带底。受主杂质（如Si中掺B、Al）：价电子数比基体少1，易从价带俘获电子产生空穴，形成p型半导体，受主能级靠近价带顶。" },
        { q: "6.3 什么是p-n结？它为什么具有单向导电性？", a: "【详细解析】p-n结是p型半导体和n型半导体的接触界面。形成时，电子从n区向p区扩散，空穴从p区向n区扩散，在内建电场作用下达到平衡，形成耗尽层。正向偏置时耗尽层变窄，电流大；反向偏置时耗尽层变宽，电流极小（仅漏电流），因此具有单向导电性，是二极管的基础。" },
        { q: "6.4 什么是金属-半导体接触的肖特基势垒？", a: "【详细解析】当金属与半导体接触时，若半导体的功函数小于金属的功函数，电子从半导体流向金属，在半导体表面形成耗尽层和势垒（肖特基势垒）。肖特基势垒高度φ_B=φ_m-χ_s，χ_s为电子亲和能。肖特基二极管具有低正向压降和快开关速度，适用于高频整流。" },
        { q: "6.5 什么是量子阱、量子线和量子点？", a: "【详细解析】量子阱：电子在一个维度受限（厚度~nm），形成二维电子气，能级为子带。量子线：电子在两个维度受限，形成一维电子气。量子点：电子在三个维度受限，形成零维电子气，能级完全分立（类原子）。这些低维结构具有独特的电子和光学性质，用于激光器、探测器等器件。" },
        { q: "6.6 解释半导体中的光吸收和发光过程。", a: "【详细解析】光吸收：光子能量大于带隙时，电子从价带跃迁到导带，产生电子-空穴对，吸收系数α∝√(hν-E_g)。发光：导带电子与价带空穴复合发光（辐射复合），能量hν≈E_g。直接带隙半导体发光效率高（如GaAs），间接带隙半导体需声子参与，效率低（如Si）。" },
        { q: "6.7 什么是异质结？它在半导体器件中有何应用？", a: "【详细解析】异质结是两种不同半导体材料（不同带隙）形成的结。能带在界面处不连续，产生能带偏移。应用：(1)高电子迁移率晶体管(HEMT)中利用调制掺杂；(2)量子阱激光器；(3)异质结双极晶体管(HBT)；(4)太阳能电池（多结电池提高效率）。" },
        { q: "6.8 什么是霍尔效应？如何利用霍尔效应测量半导体参数？", a: "【详细解析】霍尔效应：通电半导体置于垂直磁场中，载流子受洛伦兹力偏转产生横向霍尔电压V_H=IB/(ned)。测量V_H可得：(1)霍尔系数R_H=V_H d/(IB)=1/(ne)，符号判断载流子类型；(2)载流子浓度n；(3)迁移率μ=|R_H|σ。霍尔效应是半导体参数测量的基本方法。" }
    ];

    // 第七章 磁性/超导/拓展 (9道)
    const chapter7 = [
        { q: "7.1 什么是铁磁性？居里温度T_c的物理意义是什么？", a: "【详细解析】铁磁性是原子磁矩自发平行排列的现象，具有自发磁化和磁滞回线，典型材料为Fe、Co、Ni。居里温度T_c是铁磁-顺磁转变的临界温度，高于T_c时热运动破坏自发磁化，材料变为顺磁性。Fe的T_c=770℃，Co=1131℃，Ni=358℃。铁磁性来源于交换相互作用，可用海森堡模型描述。" },
        { q: "7.2 解释反铁磁性和亚铁磁性，并举例说明。", a: "【详细解析】反铁磁性：相邻原子磁矩反平行且大小相等，净磁矩为零，有奈尔温度T_N，如MnO、Cr₂O₃。亚铁磁性：相邻原子磁矩反平行但大小不等，有净磁矩，如铁氧体Fe₃O₄（磁铁矿）。亚铁磁材料具有高电阻率，广泛应用于永磁体、变压器磁芯和磁记录介质。" },
        { q: "7.3 什么是超导体的零电阻效应和迈斯纳效应？", a: "【详细解析】零电阻效应：当温度降至临界温度T_c以下时，超导体直流电阻突然降为零，可无损耗传输电流。迈斯纳效应：超导态时内部磁场被完全排出，B=0（完全抗磁性），无论降温过程是否有外磁场。迈斯纳效应是超导体的本质特征，区别于理想导体。" },
        { q: "7.4 解释BCS超导理论的基本思想。", a: "【详细解析】BCS理论（Bardeen-Cooper-Schrieffer）的核心思想：电子-声子相互作用导致两个电子之间产生有效吸引势，形成库珀对。库珀对是总动量为零的束缚态，在费米面上打开能隙Δ。临界温度T_c≈1.14Θ_D exp[-1/(N(0)V)]。BCS理论成功解释了常规超导体的性质，预言了同位素效应T_c∝M^{-1/2}。" },
        { q: "7.5 什么是第一类超导体和第二类超导体？", a: "【详细解析】第一类超导体：具有单一的临界磁场H_c，在H>H_c时超导态被破坏（如Pb、Hg），迈斯纳效应完全。第二类超导体：有下临界磁场H_c1和上临界磁场H_c2，在H_c1<H<H_c2区间处于混合态，磁场以磁通涡旋形式穿透样品，中心为非超导芯（如NbTi、YBCO）。第二类超导体有更高的临界磁场，适用于强电应用。" },
        { q: "7.6 什么是高温超导体？它们有什么共同特征？", a: "【详细解析】高温超导体是临界温度高于液氮沸点(77K)的超导材料，如铜氧化物（YBCO，T_c≈93K）、铁基超导体。共同特征：(1)层状结构（CuO₂面）；(2)各向异性强；(3)相干长度短；(4)超导配对机制非常规，可能涉及自旋涨落而非声子；(5)相图包含反铁磁绝缘体-超导-金属相变。" },
        { q: "7.7 什么是量子霍尔效应？整数量子霍尔效应和分数量子霍尔效应有何区别？", a: "【详细解析】量子霍尔效应是二维电子气在强磁场下霍耳电阻R_xy=h/(νe²)出现量子化平台（ν=1,2,3,...），纵向电阻R_xx→0。整数量子霍尔效应（ν整数）由朗道能级填充因子决定，边缘态是拓扑保护的。分数量子霍尔效应（ν为分数，如1/3）源于电子-电子相互作用，是强关联体系的重要现象。" },
        { q: "7.8 什么是拓扑绝缘体？它的表面态有何特点？", a: "【详细解析】拓扑绝缘体是体态绝缘（有能隙）但表面态为金属性的量子物态。表面态特点：(1)狄拉克锥形色散；(2)自旋-动量锁定（螺旋结构）；(3)受时间反演对称性保护，对非磁性杂质散射鲁棒；(4)二维拓扑绝缘体有量子自旋霍尔效应。典型材料：Bi₂Se₃、Bi₂Te₃、HgTe。" },
        { q: "7.9 什么是磁畴？它如何影响材料的磁化过程？", a: "【详细解析】磁畴是铁磁体中磁矩自发排列均匀的小区域，不同磁畴的磁化方向不同。磁化过程：(1)畴壁移动：弱场下磁化强度随H增大；(2)磁矩转动：强场下磁畴磁化方向转向外场方向。磁畴结构由交换能、磁晶各向异性能和退磁能的平衡决定。磁畴可用磁光克尔效应、磁力显微镜等方法观察。" }
    ];

    // ======================= 错题本存储与渲染 =======================
    let mistakeList = JSON.parse(localStorage.getItem('solid_mistakes_v5') || '[]');
    let currentModalItem = null;
    const API_BASE = 'http://localhost:5000';

    function saveMistakes() { localStorage.setItem('solid_mistakes_v5', JSON.stringify(mistakeList)); renderMistakesView(); }
    function addToMistakes(item) {
        if(!mistakeList.some(m => m.q === item.q)) {
            mistakeList.push({ ...item, addedAt: new Date().toISOString() });
            saveMistakes();
            alert('✓ 已加入错题本');
        } else alert('该题已在错题本中');
    }
    function removeMistake(index) { mistakeList.splice(index,1); saveMistakes(); }
    function clearAllMistakes() { if(confirm('清空所有错题？')) { mistakeList = []; saveMistakes(); } }
    
    function renderMistakesView() {
        const container = document.getElementById('mistakes-list-container');
        if(!container) return;
        if(mistakeList.length === 0) { container.innerHTML = '<div class="empty-state">📭 暂无错题，在题库中点击题目并“加入错题本”即可收录</div>'; return; }
        container.innerHTML = mistakeList.map((item, idx) => `
            <div class="mistake-item">
                <div style="font-weight:600;">${item.q.substring(0,100)}${item.q.length>100?'...':''}</div>
                <div style="font-size:0.85rem; color:#4a627a; margin-top:0.5rem;">📖 解析预览：${item.a.substring(0,120)}...</div>
                <button class="btn-danger" style="margin-top:0.5rem; padding:0.2rem 0.8rem;" onclick="removeMistake(${idx})">删除</button>
            </div>
        `).join('');
    }

    // 渲染所有章节
    function renderChapter(containerId, items, startIdx) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.onclick = () => {
                currentModalItem = { ...item };
                document.getElementById('modalQuestion').innerHTML = `<strong>📌 题目：</strong><br>${item.q}`;
                document.getElementById('modalAnswer').innerHTML = `<strong>✅ 详细解析：</strong><br><br>${item.a}`;
                document.getElementById('modalTitle').innerText = `详细解答 - ${item.q.substring(0,60)}`;
                document.getElementById('detailModal').classList.add('active');
            };
            const numSpan = document.createElement('span');
            numSpan.className = 'q-num';
            numSpan.innerText = startIdx + idx;
            const textSpan = document.createElement('span');
            textSpan.className = 'q-text';
            let displayText = item.q.length > 65 ? item.q.slice(0,65)+'...' : item.q;
            textSpan.innerText = displayText;
            card.appendChild(numSpan);
            card.appendChild(textSpan);
            container.appendChild(card);
        });
    }

    renderChapter('ch1-list', chapter1, 1);
    renderChapter('ch2-list', chapter2, 1);
    renderChapter('ch3-list', chapter3, 1);
    renderChapter('ch4-list', chapter4, 1);
    renderChapter('ch5-list', chapter5, 1);
    renderChapter('ch6-list', chapter6, 1);
    renderChapter('ch7-list', chapter7, 1);

    // AI 功能（对接后端）
    async function callAPI(endpoint, data) {
        try {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            return await res.json();
        } catch(e) { return { success: false, error: `后端未启动: ${e.message}` }; }
    }
    async function sendChat() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if(!msg) return;
        const chatArea = document.getElementById('chat-area');
        chatArea.innerHTML += `<div class="message message-user">${escapeHtml(msg)}</div>`;
        input.value = '';
        chatArea.scrollTop = chatArea.scrollHeight;
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message message-ai loading-dots'; loadingDiv.innerText = 'AI思考中';
        chatArea.appendChild(loadingDiv);
        const result = await callAPI('/api/chat', { message: `请详细回答固体物理问题：${msg}` });
        loadingDiv.remove();
        const reply = result.success ? result.reply : `❌ ${result.error}`;
        chatArea.innerHTML += `<div class="message message-ai">${escapeHtml(reply)}</div>`;
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    async function explainConcept() {
        const concept = document.getElementById('concept-input').value.trim();
        if(!concept) return;
        const out = document.getElementById('concept-output');
        out.innerHTML = '<div class="loading-dots">正在深度解释概念...</div>';
        const result = await callAPI('/api/explain-concept', { concept });
        out.innerHTML = result.success ? result.explanation : `错误: ${result.error}`;
    }
    async function analyzeMistake() {
        const question = document.getElementById('mistake-question').value.trim();
        const user_answer = document.getElementById('mistake-user-ans').value.trim();
        const correct_answer = document.getElementById('mistake-correct-ans').value.trim();
        if(!question) { alert('请输入题目'); return; }
        const out = document.getElementById('analysis-output');
        out.innerHTML = '<div class="loading-dots">AI深度分析中...</div>';
        const result = await callAPI('/api/analyze-mistake', { question, user_answer, correct_answer });
        out.innerHTML = result.success ? result.analysis : `分析失败: ${result.error}`;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // UI 切换
    function switchMainView(view) {
        document.querySelectorAll('.main-view').forEach(v => v.style.display = 'none');
        document.getElementById(`${view}-view`).style.display = 'block';
        document.querySelectorAll('.main-nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.main-nav-btn[data-main="${view}"]`).classList.add('active');
        if(view === 'mistakes') renderMistakesView();
    }
    document.querySelectorAll('.main-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMainView(btn.getAttribute('data-main')));
    });
    // 分类切换（章节）
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.category-panel');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const targetId = btn.getAttribute('data-tab');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            panels.forEach(panel => panel.classList.remove('active-panel'));
            document.getElementById(`tab-${targetId}`).classList.add('active-panel');
        });
    });
    // 模态框
    const modal = document.getElementById('detailModal');
    document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });
    document.getElementById('modal-add-mistake').addEventListener('click', () => {
        if(currentModalItem) addToMistakes(currentModalItem);
        else alert('无题目数据');
    });
    document.getElementById('clear-mistakes-btn')?.addEventListener('click', clearAllMistakes);
    document.getElementById('send-chat')?.addEventListener('click', sendChat);
    document.getElementById('explain-btn')?.addEventListener('click', explainConcept);
    document.getElementById('analyze-mistake-btn')?.addEventListener('click', analyzeMistake);
    window.removeMistake = removeMistake;
    renderMistakesView();
    fetch(`${API_BASE}/api/health`).catch(() => console.log('后端未启动，AI功能暂不可用'));
</script>
</body>
</html>
